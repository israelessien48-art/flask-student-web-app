<h2>Search Student</h2>

<form method="POST">
    <input type="text" name="name" placeholder="Enter student name">
    <button type="submit">Search</button>
</form>

<br>

{% for student in results %}
<p>
    {{ student[0] }} -
    {{ student[1] }} -
    {{ student[2] }} -
    {{ student[3] }}
</p>
{% endfor %}

<br>
<a href="/">Back Home</a>
